<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images, Tables and Lists</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <img width="250" height="190" src="Image.jpg" alt="Image of html">

    <br>
    <table>
        <caption>Student Details</caption>
        <thead>
            <tr>

                <th>Name</th>
                <th>Age</th>
                <th>Designation</th>

            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Pranshul</td>
                <td>18</td>
                <td>Student</td>
            </tr>

            <tr>
                <td>Gaurav</td>
                <td>18</td>
                <td>Student</td>
            </tr>

            <tr>
                <td>Sam</td>
                <td>18</td>
                <td>Student</td>
            </tr>

            <tr>
                <td>Rohan</td>
                <td>18</td>
                <td>Student</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="3">End Of the Students Table</td>
            </tr>
        </tfoot>
    </table>

    <ul type="square"> <!-- unordered list(here the type="square" makes the bullet points in shape of squares) -->
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>

    <ol type="I"> <!-- ordered list (here the type="I" makes the list items in Roman numerals) -->
        <li>Pranshul</li>
        <li>Gaurav</li>
        <li>Sam</li>
    </ol>



    <dl> <!-- definition list -->

        <dt>HTML</dt>
        <dd>Hyper Text Markup Language</dd>

        <dt>CSS</dt>
        <dd>Cascading Style Sheets</dd>

        <dt>JS</dt>
        <dd>JavaScript</dd>
    </dl>


</body>

</html>
