<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline and Block elements - HTML</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <p>
        Hello there, I am Pranshul.
    </p>
    <!-- paragraphs are block elements and hence the color of background spreads throughout the line of the content of paragraph-->
    <a href="https://www.google.com">Visit Google</a>
    <!-- the anchor tag is an inline element and hence the background color is limited to the contents of the anchor tag/inline element-->
    <div>this is a block element</div>
    <!-- div is a block element and hence the background color spreads throughout the line of the content of div -->
    <span>span is similar to div tag but it is an inline element</span>
    <a href="">yes span is inline</a>
    <!-- inline elements can be displayed within a line of text but block elements cannot -->
</body>

</html>
